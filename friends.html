    function MyGraph() {
      const fgRef = useRef();

      useEffect(() => {
        if (fgRef.current) {
          fgRef.current.d3Force('link').distance(200);
        }
      }, []);
      return <ForceGraph3D
        ref={fgRef}  
        graphData={friends}
        linkColor={(link) => {
          if (link.value == 3) return "rgba(70, 207, 120, 1);";
          if (link.value == 2) return "rgba(232, 228, 84, 1);";
          if (link.value == 1) return "rgba(245, 73, 39, 1);";
          return "rgba(255, 255, 255, 0.3)";
        }}
        nodeAutoColorBy="group"
        linkWidth={1.5}
        nodeThreeObjectExtend={true}
        nodeThreeObject={(node) => {
          const sprite = new SpriteText(node.id);
          sprite.color = node.color;
          sprite.textHeight = 8;
          sprite.center.y = -0.6; // shift above node
          return sprite;
        }}
      />
    }
    
    createRoot(document.getElementById("graph")).render(
